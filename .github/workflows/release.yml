name: Build & Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write # 🔥 required for creating releases

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        name: Build binaries
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      binary_name: tic-tac-toe-linux

                    - os: windows-latest
                      target: x86_64-pc-windows-gnu
                      binary_name: tic-tac-toe-windows.exe

                    - os: macos-latest
                      target: x86_64-apple-darwin
                      binary_name: tic-tac-toe-macos

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Rust
              run: rustup target add ${{ matrix.target }}

            - name: Build
              run: cargo build --release --target ${{ matrix.target }}

            - name: Prepare binary
              shell: bash
              run: |
                  mkdir dist

                  if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
                    cp target/${{ matrix.target }}/release/tic-tac-toe.exe dist/${{ matrix.binary_name }}
                  else
                    cp target/${{ matrix.target }}/release/tic-tac-toe dist/${{ matrix.binary_name }}
                  fi

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/*
                  overwrite_files: true
